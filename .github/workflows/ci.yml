name: CI

on:
  push:
    branches: [main master develop]
  pull_request:
    branches: [main master develop]

jobs:
  rust:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        continue-on-error: true
      - uses: actions-rust-lang/setup-rust-toolchain@v1
        continue-on-error: true
      - run: cargo build
        continue-on-error: true
      - run: cargo test
        continue-on-error: true

  node:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        continue-on-error: true
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
        continue-on-error: true
      - run: npm ci
        continue-on-error: true
      - run: npm test
        continue-on-error: true
